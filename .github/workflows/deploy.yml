name: Deploy to VPS

on:
  push:
    branches: [dev, staging, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Set branch-dependent variables
            BRANCH="${{ github.ref_name }}"

            # Fetch and checkout the exact branch
            echo "Switching branch and pulling changes..."
            cd ~/brutige-react
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH

            # Install dependencies
            echo "Installing dependencies..."
            npm install

            # Define PM2 process name and port based on branch
            case "$BRANCH" in
              dev)
                PM2_NAME="dev-react"
                PORT=5173
                ;;
              staging)
                PM2_NAME="staging-react"
                PORT=5174
                ;;
              main)
                PM2_NAME="prod-react"
                PORT=5175
                ;;
            esac

            # Start or restart the process with the correct port
            echo "Restarting app..."
            npx pm2 restart $PM2_NAME 2>/dev/null || \
              npx pm2 start "PORT=$PORT npm run dev" --name $PM2_NAME

            # Save PM2 process list
            npx pm2 save
